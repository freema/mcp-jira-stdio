version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    reviewers:
      - 'freema'
    groups:
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
    ignore:
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'monthly'
